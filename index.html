<!doctype html>
<html lang="en">

    <!-- Primary SEO Meta -->

      content="trucking leads, verified carrier contacts, FMCSA safety reports, CSA scores, MC DOT data, freight broker leads, carrier intelligence, trucking CRM, compliance data"
    />

    <link rel="canonical" href="https://truckmind.com/" />
    <meta name="theme-color" content="#05070d" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TruckMind — Trucking Growth Intelligence Platform" />

      property="og:description"
      content="Verified trucking prospects, safety intelligence, and compliance data in one platform. Find leads, gain intelligence, grow faster."

    <meta property="og:url" content="https://truckmind.com/" />
    <meta property="og:site_name" content="TruckMind" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TruckMind — Trucking Growth Intelligence Platform" />

      name="twitter:description"
      content="Verified trucking prospects, safety intelligence, and compliance data in one platform."
    />
    <meta name="twitter:image" content="/fmcsa-intelligence.webp" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <script type="application/ld+json">

        "@context": "https://schema.org",

        "name": "TruckMind",
        "applicationCategory": "BusinessApplication",

        }
